<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rikim Apartments - Management System</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/tables.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/dashboard.css">
    <link rel="stylesheet" href="css/components/notifications.css">
    
    <style>
        /* =============================================
           LOGIN PAGE STYLES (Embedded for reliability)
           ============================================= */
        
        /* Login Page Body */
        body.login-page {
            background-image: url('assets/images/login-splash.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #2A2A2A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* Login Container (Glass effect) */
        .login-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 255, 255, 0.25);
            max-width: 440px;
            width: 100%;
            animation: slideUp 0.5s cubic-bezier(0.21, 0.98, 0.35, 1.0);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo img {
            height: 64px;
            width: auto;
            margin-bottom: 12px;
        }
        
        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        
        .login-container .form-group {
            margin-bottom: 20px;
        }
        
        .login-container .btn {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 1rem;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-footer a {
            color: var(--primary);
            font-size: 0.85rem;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* Dashboard - Hidden by default */
        #app {
            display: none;
        }
        
        /* Show dashboard when logged in */
        body.dashboard-page #app {
            display: flex;
        }
        
        /* Hide login when dashboard is shown */
        body.dashboard-page .login-container-wrapper {
            display: none;
        }
        
        /* Login container wrapper */
        .login-container-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        
        /* Responsive login */
        @media (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
                margin: 16px;
            }
            .login-logo img {
                height: 48px;
            }
            .login-logo h1 {
                font-size: 1.3rem;
            }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 24px 16px;
            }
            .login-logo img {
                height: 40px;
            }
        }
    </style>
</head>
<body class="login-page">
    <!-- =============================================
         LOGIN VIEW (Visible by default)
         ============================================= -->
    <div class="login-container-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <img src="assets/images/logo.png" alt="Rikim Apartments">
                <h1>Rikim Apartments</h1>
                <p>Property Management System</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address <span class="required">*</span></label>
                    <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="login-password">Password <span class="required">*</span></label>
                    <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                
                <div class="login-footer">
                    <a href="#">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <!-- =============================================
         DASHBOARD VIEW (Hidden until login)
         ============================================= -->
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img 
                        src="assets/images/logo.png" 
                        alt="Rikim Apartments Logo" 
                        class="logo-image"
                        id="logo-image"
                    >
                    <span class="logo-text">Rikim</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav id="sidebar-nav" class="sidebar-nav">
                <!-- Dynamically loaded based on role -->
            </nav>
            <div class="sidebar-footer">
                <div id="user-info" class="user-info">
                    <img src="assets/images/default-avatar.png" alt="User" class="user-avatar" id="user-avatar">
                    <div class="user-details">
                        <span id="user-name" class="user-name">User</span>
                        <span id="user-role" class="user-role">Role</span>
                    </div>
                </div>
                <button id="logout-btn" class="logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="navbar-left">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="page-title" class="page-title">Dashboard</h1>
                </div>
                <div class="navbar-right">
                    <div class="notification-bell" id="notification-bell">
                        <i class="fas fa-bell"></i>
                        <span id="notification-count" class="notification-count">0</span>
                    </div>
                </div>
            </header>

            <!-- Page Content Container -->
            <div id="page-content" class="page-content">
                <!-- Dynamically loaded pages -->
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-container"></div>

    <!-- Scripts -->
    <script type="module" src="src/app.js"></script>
    
    <!-- =============================================
         SIMPLE LOGIN HANDLER (For demo/testing)
         ============================================= -->
    <script>
        // This is a simple login handler for testing the background image.
        // Your actual login logic is in src/app.js
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('login-form');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Simple demo login - replace with your actual auth
                    const email = document.getElementById('login-email').value;
                    const password = document.getElementById('login-password').value;
                    
                    if (email && password) {
                        // Switch to dashboard
                        document.body.classList.remove('login-page');
                        document.body.classList.add('dashboard-page');
                        
                        // Show toast notification
                        showToast('Welcome back!', 'success');
                    } else {
                        showToast('Please enter your credentials', 'error');
                    }
                });
            }
            
            // Simple toast function for demo
            function showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                if (!container) return;
                
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <span class="toast-icon">
                        <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                    </span>
                    <span class="toast-message">${message}</span>
                    <button class="toast-close" onclick="this.parentElement.remove()">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.classList.add('removing');
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }
            
            // Make showToast available globally
            window.showToast = showToast;
        });
    </script>
</body>
</html>
